name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sukiru_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest pytest-asyncio

      - name: Run linting (flake8)
        run: |
          pip install flake8
          flake8 backend/app --max-line-length=120 --ignore=E203,W503,E501 || true
        continue-on-error: true

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: sukiru_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          SECRET_KEY: test_secret_key_for_ci
        run: |
          cd backend
          pytest tests/ -v --tb=short || true

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: sukiru-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: sukiru-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true

  notify:
    needs: [test, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Status summary
        run: |
          echo "✅ CI/CD Pipeline completed"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
