version: "3.9"

services:

  db:
    image: postgres:16

    container_name: sukiru_db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sukiru

    ports:
      - "15432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: