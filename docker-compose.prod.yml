version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sukiru_backend_prod
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: sukiru
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - sukiru_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sukiru_frontend_prod
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      API_BASE: ${API_BASE:-http://backend:8000}
    networks:
      - sukiru_network

  db:
    image: postgres:16
    container_name: sukiru_db_prod
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: sukiru
    ports:
      - "${DB_PORT:-15432}:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sukiru_network

volumes:
  postgres_data_prod:
    driver: local

networks:
  sukiru_network:
    driver: bridge
